  <!-- buttons row 2 -->
  <rect x="12" y="26.5" width="5" height="4" fill="#cfcabb" stroke="#8a867a" stroke-width="0.7"/>
  <rect x="18.5" y="26.5" width="5" height="4" fill="#cfcabb" stroke="#8a867a" stroke-width="0.7"/>
  <rect x="25" y="26.5" width="5" height="4" fill="#cfcabb" stroke="#8a867a" stroke-width="0.7"/>
  <rect x="31" y="26.5" width="5" height="4" fill="#cfcabb" stroke="#8a867a" stroke-width="0.7"/>
  <!-- buttons row 3 -->
  <rect x="12" y="32" width="5" height="4" fill="#cfcabb" stroke="#8a867a" stroke-width="0.7"/>
  <rect x="18.5" y="32" width="5" height="4" fill="#cfcabb" stroke="#8a867a" stroke-width="0.7"/>
  <rect x="25" y="32" width="5" height="4" fill="#cfcabb" stroke="#8a867a" stroke-width="0.7"/>
  <rect x="31" y="32" width="5" height="9.5" fill="#e0703f" stroke="#9a2a10" stroke-width="0.7"/>
